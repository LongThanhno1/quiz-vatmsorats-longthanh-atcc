<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ôn tập CNS (Communication · Navigation · Surveillance)</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
* { box-sizing: border-box; }
body { margin:0; padding:0; font-family:"Segoe UI",system-ui,-apple-system,sans-serif; overflow-x:hidden; }

/* ===== SKY BACKGROUND ===== */
.sky-bg {
  background: linear-gradient(180deg,
    #0d2b5e 0%,
    #1a4a8a 12%,
    #1e6db5 28%,
    #2e8fd4 45%,
    #60b8e8 62%,
    #90d0f0 78%,
    #bde6f7 90%,
    #d8f2fb 100%);
  min-height: 100vh;
  position: relative;
  overflow: hidden;
}

/* Stars layer */
.sky-bg::before {
  content:'';
  position:absolute;
  inset:0;
  background-image:
    radial-gradient(1px 1px at 15% 8%, rgba(255,255,255,0.9) 0%, transparent 100%),
    radial-gradient(1px 1px at 25% 5%, rgba(255,255,255,0.7) 0%, transparent 100%),
    radial-gradient(1.5px 1.5px at 40% 3%, rgba(255,255,255,0.8) 0%, transparent 100%),
    radial-gradient(1px 1px at 60% 7%, rgba(255,255,255,0.6) 0%, transparent 100%),
    radial-gradient(1px 1px at 75% 4%, rgba(255,255,255,0.8) 0%, transparent 100%),
    radial-gradient(1px 1px at 85% 9%, rgba(255,255,255,0.7) 0%, transparent 100%),
    radial-gradient(1px 1px at 10% 15%, rgba(255,255,255,0.5) 0%, transparent 100%),
    radial-gradient(1.5px 1.5px at 90% 12%, rgba(255,255,255,0.6) 0%, transparent 100%);
  pointer-events:none;
  opacity:0.7;
}

/* ===== CLOUDS ===== */
.cloud { position:absolute; background:white; border-radius:50px; filter:blur(3px); }
.c1 { width:220px;height:60px; top:22%;left:8%;  opacity:0.55; box-shadow:85px 0 0 22px white,170px -12px 0 12px white; }
.c2 { width:150px;height:45px; top:18%;left:52%; opacity:0.4;  box-shadow:60px 0 0 16px white,120px -8px 0 8px white; }
.c3 { width:100px;height:32px; top:14%;left:72%; opacity:0.45; box-shadow:44px -6px 0 10px white; }
.c4 { width:180px;height:50px; top:28%;left:28%; opacity:0.35; box-shadow:70px 0 0 20px white; }
.c5 { width:260px;height:70px; top:20%;left:-3%; opacity:0.5;  box-shadow:100px 5px 0 28px white,200px 0 0 18px white; }
.c6 { width:130px;height:38px; top:32%;left:65%; opacity:0.3;  box-shadow:52px 0 0 14px white; }

/* ===== CONTENT OVERLAY ===== */
.content-overlay {
  position:relative;
  min-height:100vh;
  display:flex;
  flex-direction:column;
}

/* ===== MODULE BUBBLES ===== */
.module-bubble {
  cursor:pointer;
  transition:all 0.32s cubic-bezier(0.34,1.56,0.64,1);
  user-select:none;
}
.module-bubble:hover { transform:translateY(-10px) scale(1.07); filter:drop-shadow(0 22px 32px rgba(0,0,0,0.32)); }
.module-bubble:active { transform:scale(0.96); }

.bubble-inner {
  border-radius:22px;
  padding:28px 18px 22px;
  text-align:center;
  border:2px solid rgba(255,255,255,0.55);
  backdrop-filter:blur(18px);
  -webkit-backdrop-filter:blur(18px);
  position:relative;
  overflow:hidden;
  transition:border-color 0.2s;
}
.bubble-inner::before {
  content:'';
  position:absolute;
  top:0;left:0;right:0;
  height:45%;
  background:rgba(255,255,255,0.18);
  border-radius:20px 20px 60% 60%;
  pointer-events:none;
}
.module-bubble:hover .bubble-inner {
  border-color:rgba(255,255,255,0.85);
}

/* ===== EXAM SCREEN ===== */
.exam-bg {
  background:linear-gradient(135deg,#060d1a 0%,#0b1a30 50%,#060d1a 100%);
  min-height:100vh;
}

/* ===== OPTIONS ===== */
.option-btn {
  cursor:pointer;
  transition:all 0.18s;
  border:2px solid rgba(255,255,255,0.07);
  border-radius:12px;
  padding:12px 16px;
  min-height:52px;
  display:flex;
  align-items:flex-start;
  gap:12px;
  background:rgba(255,255,255,0.03);
}
.option-btn:hover  { border-color:rgba(14,165,233,0.55)!important; background:rgba(14,165,233,0.09)!important; transform:translateX(4px); }
.option-btn.selected { border-color:#0ea5e9!important; background:rgba(14,165,233,0.14)!important; }
.option-btn.correct  { border-color:#10b981!important; background:rgba(16,185,129,0.14)!important; }
.option-btn.wrong    { border-color:#ef4444!important; background:rgba(239,68,68,0.14)!important; }

/* ===== NAV GRID ===== */
.nav-btn {
  min-width:34px; min-height:34px; border-radius:7px;
  cursor:pointer; transition:all 0.12s; font-size:11px; font-weight:700;
  display:flex; align-items:center; justify-content:center;
  background:rgba(255,255,255,0.06); color:rgba(255,255,255,0.45);
}
.nav-btn.answered { background:#0ea5e9; color:white; }
.nav-btn.current  { outline:2px solid white; outline-offset:2px; color:white; }

/* Timer */
.timer-warn { animation:blink 0.9s infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.35} }

/* FAB */
.fab { position:fixed; bottom:22px; right:22px; z-index:50; }

/* Drawer */
.drawer {
  position:fixed; bottom:0; left:0; right:0; z-index:40;
  max-height:65vh; overflow-y:auto;
  transform:translateY(100%); transition:transform 0.3s ease;
  background:rgba(6,13,26,0.97); backdrop-filter:blur(20px);
  border-radius:20px 20px 0 0;
  border-top:1px solid rgba(255,255,255,0.1);
}
.drawer.open { transform:translateY(0); }

/* Scrollbar */
::-webkit-scrollbar { width:4px; }
::-webkit-scrollbar-thumb { background:rgba(255,255,255,0.14); border-radius:2px; }

@media(min-width:1024px) { .fab,.drawer { display:none!important; } .lg-sidebar { display:block; } }
@media(max-width:1023px)  { .lg-sidebar { display:none; } }
</style>
</head>
<body>

<!-- ======================================================
     START SCREEN — LONG THANH ATC SCENE
     ====================================================== -->
<div id="startScreen" class="sky-bg">
  <!-- Clouds -->
  <div class="cloud c1"></div><div class="cloud c2"></div>
  <div class="cloud c3"></div><div class="cloud c4"></div>
  <div class="cloud c5"></div><div class="cloud c6"></div>

  <!-- ===== SVG SCENE ===== -->
  <svg class="absolute bottom-0 left-0 right-0 w-full" viewBox="0 0 1440 480"
       preserveAspectRatio="xMidYMax slice" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <!-- Sky horizon glow -->
      <radialGradient id="sunGlow" cx="38%" cy="72%" r="30%">
        <stop offset="0%"  stop-color="#ffe8a0" stop-opacity="0.35"/>
        <stop offset="40%" stop-color="#ffb347" stop-opacity="0.12"/>
        <stop offset="100%" stop-color="transparent" stop-opacity="0"/>
      </radialGradient>
      <!-- Mountains -->
      <linearGradient id="mtnFar" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#3a7ca8" stop-opacity="0.55"/>
        <stop offset="100%" stop-color="#2a5e80" stop-opacity="0.7"/>
      </linearGradient>
      <linearGradient id="mtnMid" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#2e6e90"/>
        <stop offset="100%" stop-color="#1a4e6a"/>
      </linearGradient>
      <linearGradient id="mtnNear" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#1e5a70"/>
        <stop offset="100%" stop-color="#0f3a50"/>
      </linearGradient>
      <!-- Ground -->
      <linearGradient id="groundGrd" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%"  stop-color="#2d7a42"/>
        <stop offset="100%" stop-color="#173e22"/>
      </linearGradient>
      <!-- Tower shaft -->
      <linearGradient id="towerShaft" x1="0" y1="0" x2="1" y2="0">
        <stop offset="0%"   stop-color="#d0e8f4"/>
        <stop offset="30%"  stop-color="#f0f8fc"/>
        <stop offset="70%"  stop-color="#ffffff"/>
        <stop offset="100%" stop-color="#bcd8ea"/>
      </linearGradient>
      <!-- Dome -->
      <radialGradient id="domeGrd" cx="40%" cy="38%" r="60%">
        <stop offset="0%"  stop-color="#f8fdff"/>
        <stop offset="60%" stop-color="#e0f4fc"/>
        <stop offset="100%" stop-color="#b8dff0"/>
      </radialGradient>
      <!-- Terminal -->

        <stop offset="0%"   stop-color="#c8e8f8"/>
        <stop offset="100%" stop-color="#8ec8e0"/>
      </linearGradient>
      <!-- Runway -->

      </linearGradient>
      <!-- Shadow filter -->

      </filter>
      <filter id="shadowSm" x="-5%" y="-5%" width="110%" height="110%">
        <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="rgba(0,30,60,0.35)"/>
      </filter>
    </defs>

    <!-- Horizon glow -->
    <rect x="0" y="0" width="1440" height="480" fill="url(#sunGlow)"/>

    <!-- ── FAR MOUNTAINS ── -->
    <path d="M0,310 Q80,255 180,278 Q280,245 400,268 Q520,235 640,260
             Q760,230 880,252 Q1000,222 1120,248 Q1240,218 1360,238 L1440,245
             L1440,480 L0,480 Z" fill="url(#mtnFar)"/>

    <!-- ── MID MOUNTAINS ── -->

             Q840,258 960,280 Q1080,255 1200,272 Q1320,248 1440,265
             L1440,480 L0,480 Z" fill="url(#mtnMid)"/>

    <!-- ── NEAR HILLS ── -->

             Q1100,318 1260,332 Q1360,320 1440,328
             L1440,480 L0,480 Z" fill="url(#mtnNear)"/>

    <!-- ── GROUND BASE ── -->

    <!-- ── RUNWAY ── -->
    <rect x="180" y="370" width="820" height="28" rx="2" fill="url(#runwayGrd)" opacity="0.88"/>
    <!-- Runway centerline dashes -->

      <rect x="954" y="372" width="6" height="24" rx="1"/>
    </g>

    <!-- ── TAXIWAY ── -->
    <rect x="0" y="362" width="1440" height="14" fill="#1e3040" opacity="0.55" rx="1"/>
    <!-- Yellow taxiway centerline -->
    <line x1="0" y1="369" x2="1440" y2="369" stroke="rgba(255,200,0,0.45)" stroke-width="2" stroke-dasharray="32,16"/>

    <!-- ══════════════════════════════════════════════════
         ATC TOWER — Long Thanh Style (center-left)
         Positioned at x=320 translate
         ══════════════════════════════════════════════════ -->
    <g filter="url(#shadow)" transform="translate(295,0)">

      <!-- BASE BUILDING (broader foundation) -->

      <!-- Base windows -->
      <rect x="58" y="328" width="20" height="28" rx="2" fill="rgba(80,180,230,0.35)"/>
      <rect x="84" y="328" width="20" height="28" rx="2" fill="rgba(80,180,230,0.35)"/>
      <rect x="110" y="328" width="20" height="28" rx="2" fill="rgba(80,180,230,0.35)"/>
      <!-- Base door -->
      <rect x="86" y="343" width="28" height="35" rx="3" fill="rgba(60,160,210,0.3)"/>
      <!-- Base shadow line -->
      <rect x="44" y="370" width="112" height="5" rx="0" fill="rgba(0,40,70,0.18)"/>

      <!-- SHAFT — elegant tapered column -->
      <!-- Outer shadow shape -->
      <path d="M72,186 L72,318 L128,318 L128,186 Q100,178 72,186 Z" fill="rgba(0,40,70,0.12)"/>
      <!-- Main shaft -->
      <path d="M74,182 L74,318 L126,318 L126,182 Q100,175 74,182 Z" fill="url(#towerShaft)"/>
      <!-- Shaft side highlight -->

      <rect x="74" y="228" width="52" height="6" rx="0" fill="rgba(0,60,90,0.12)"/>

      <!-- EQUIPMENT ROOM (mid-shaft bulge) -->
      <rect x="68" y="240" width="64" height="22" rx="4" fill="#daeef8"/>

      <!-- NECK (transition to cab) -->
      <rect x="82" y="148" width="36" height="38" rx="4" fill="url(#towerShaft)"/>

      <!-- CONTROL CAB FLOOR SLAB -->
      <rect x="54" y="162" width="92" height="10" rx="3" fill="#daeef8"/>

      <!-- CONTROL CAB — wraparound glass -->
      <path d="M50,125 Q100,102 150,125 L150,164 Q100,158 50,164 Z" fill="#d8eef8"/>
      <!-- CAB glass panels -->
      <rect x="54" y="124" width="13" height="38" rx="1" fill="rgba(100,200,240,0.45)" opacity="0.9"/>
      <rect x="70" y="119" width="14" height="42" rx="1" fill="rgba(120,210,245,0.5)" opacity="0.9"/>
      <rect x="87" y="116" width="14" height="44" rx="1" fill="rgba(130,215,248,0.55)" opacity="0.9"/>
      <rect x="104" y="117" width="13" height="44" rx="1" fill="rgba(120,210,245,0.5)" opacity="0.9"/>
      <rect x="120" y="120" width="13" height="41" rx="1" fill="rgba(110,205,242,0.45)" opacity="0.9"/>
      <rect x="136" y="126" width="11" height="37" rx="1" fill="rgba(100,200,240,0.4)" opacity="0.9"/>

      <!-- MAIN RADOME (SSR dome) -->

      <circle cx="100" cy="65" r="36" fill="url(#domeGrd)" stroke="#b8d8ea" stroke-width="2"/>
      <!-- Dome panel seam lines -->
      <path d="M68,65 Q100,38 132,65" stroke="#c8e4f0" stroke-width="1.2" fill="none" opacity="0.7"/>
      <path d="M64,72 Q100,82 136,72" stroke="#c8e4f0" stroke-width="1.2" fill="none" opacity="0.7"/>
      <path d="M70,52 Q100,45 130,52" stroke="#c8e4f0" stroke-width="1" fill="none" opacity="0.5"/>

      <!-- Dome bottom ring -->

      <rect x="163" y="180" width="16" height="20" rx="2" fill="#c0daea" opacity="0.8"/>

    <!-- ══════════════════════════════════════════════════
         TERMINAL BUILDING — Long Thanh wave roof
         ══════════════════════════════════════════════════ -->
    <g filter="url(#shadowSm)" transform="translate(660,0)">
      <!-- Main body -->
      <rect x="0" y="278" width="640" height="96" rx="5" fill="url(#termGrd)"/>
      <!-- Wave/undulating roof — iconic Long Thanh shape -->

        <rect x="544" y="297" width="32" height="22" rx="2"/>

      </g>
      <!-- Entrance canopy -->
      <path d="M270,326 L270,374 L380,374 L380,326 Z" fill="rgba(180,220,240,0.4)"/>
      <path d="M258,324 Q325,310 400,324" stroke="#b0d8f0" stroke-width="2" fill="rgba(200,235,250,0.3)"/>
      <!-- Jetbridge support columns -->
      <g fill="#8ab8cc" opacity="0.7">
        <rect x="60"  y="360" width="5" height="14" rx="1"/>
        <rect x="180" y="358" width="5" height="16" rx="1"/>
        <rect x="440" y="360" width="5" height="14" rx="1"/>
        <rect x="560" y="358" width="5" height="16" rx="1"/>
      </g>
      <!-- Ground equipment / vehicles -->
      <rect x="40"  y="364" width="48" height="10" rx="3" fill="#78a8bc" opacity="0.8"/>
      <rect x="200" y="362" width="60" height="12" rx="3" fill="#78a8bc" opacity="0.8"/>
      <rect x="460" y="364" width="44" height="10" rx="3" fill="#78a8bc" opacity="0.8"/>
      <!-- Parked aircraft hint (far right) -->
      <g transform="translate(545,340)" opacity="0.55">
        <ellipse cx="0" cy="10" rx="52" ry="6" fill="#c8d8e0"/>
        <rect x="-8" y="2" width="20" height="6" rx="3" fill="#d8e8f0"/>
        <path d="M-52,8 L-8,5 L12,8 Z" fill="#c0d0da"/>
        <path d="M12,8 L52,10 L12,12 Z" fill="#c0d0da"/>
        <rect x="-10" y="0" width="5" height="14" rx="1" fill="#b0c8d8"/>
      </g>
    </g>

    <!-- ── TREES — left dense cluster ── -->

const MODULE_CONFIG = [
  { id:"VHF",     icon:"📡", label:"VHF",     name:"VHF (Thông tin vô tuyến VHF)",         draw:50, color:"#38bdf8", bg:"rgba(14,165,233,0.18)", grd:"linear-gradient(135deg,#0369a1,#0ea5e9)" },

  { id:"ADS-B",   icon:"🛰",  label:"ADS-B",   name:"ADS-B (Giám sát tự động phụ thuộc)",   draw:50, color:"#34d399", bg:"rgba(16,185,129,0.18)", grd:"linear-gradient(135deg,#064e3b,#059669)" },

  { id:"VCCS",    icon:"☎",  label:"VCCS",    name:"VCCS (Điều khiển thoại không địa)",    draw:50, color:"#f472b6", bg:"rgba(236,72,153,0.18)", grd:"linear-gradient(135deg,#831843,#db2777)" },
  { id:"SMS",     icon:"🛡",  label:"SMS",     name:"SMS & Báo cáo an toàn hàng không",     draw:17, color:"#fb923c", bg:"rgba(249,115,22,0.18)", grd:"linear-gradient(135deg,#7c2d12,#ea580c)" },
  { id:"A-SGMCS", icon:"⚙",  label:"A-SGMCS", name:"A-SGMCS (Hệ thống giám sát mặt đất)", draw:50, color:"#22d3ee", bg:"rgba(6,182,212,0.18)",  grd:"linear-gradient(135deg,#164e63,#0891b2)" },

// State
let selectedModule = null;
let examQuestions  = [];
let userAnswers    = {};
let currentIdx     = 0;
let timerInterval  = null;
let secondsLeft    = 50 * 60;
let reviewFilter   = 'all';

// Helpers
const shuffle = arr => { let a=[...arr]; for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a; };
const fmt = s => `${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;
const getMC = id => MODULE_CONFIG.find(m=>m.id===id)||{color:'#64748b',name:id,icon:'?',grd:'',bg:''};
const $ = id => document.getElementById(id);

// ── RENDER MODULE BUBBLES ──
function renderBubbles() {
  $('bubbleGrid').innerHTML = MODULE_CONFIG.map(m => `
    <div class="module-bubble" onclick="startExam('${m.id}')">
      <div class="bubble-inner" style="background:${m.bg};border-color:${m.color}60">
        <div style="font-size:2.4rem;margin-bottom:10px;filter:drop-shadow(0 4px 10px ${m.color}99)">${m.icon}</div>
        <div style="font-weight:900;font-size:1rem;color:${m.color};margin-bottom:4px;letter-spacing:.02em">${m.label}</div>
        <div style="font-size:0.72rem;color:rgba(255,255,255,0.58);line-height:1.35;min-height:26px">
          ${m.name.replace(m.label+' ','').replace(m.label,'').trim()}
        </div>
      </div>
    </div>`).join('');
}

// ── START EXAM (direct — no modal) ──
// SECURITY: chỉ lấy câu từ questionBank đã nạp sẵn — không tạo câu mới.
// Nếu pool < 50 → lấy toàn bộ; nếu pool >= 50 → bốc ngẫu nhiên đúng 50 câu.
function startExam(moduleId) {
  selectedModule = moduleId;
  const mc       = getMC(moduleId);

  // --- STRICT POOL: chỉ câu thuộc đúng module này ---
  const rawPool  = questionBank.filter(q => q.module === moduleId);

  if (rawPool.length === 0) {
    alert(`⚠ Module "${mc.label}" chưa có câu hỏi trong ngân hàng đề.\nVui lòng bổ sung dữ liệu vào questionBank trước khi thi.`);
    return;
  }

  // Trộn ngẫu nhiên (Fisher-Yates), sau đó bốc tối đa 50 câu
  const MAX_DRAW = 50;
  const pool     = shuffle(rawPool);          // toàn bộ pool đã trộn
  const count    = Math.min(MAX_DRAW, pool.length);   // <= 50, không bao giờ vượt pool
  examQuestions  = pool.slice(0, count).map(q => ({ ...q, options: shuffle(q.options) }));

  userAnswers  = {};
  currentIdx   = 0;
  secondsLeft  = 50 * 60;

  $('startScreen').classList.add('hidden');
  $('examScreen').classList.remove('hidden');

  const badge = $('examModuleBadge');
  badge.textContent   = mc.label;
  badge.style.background  = mc.bg;
  badge.style.color       = mc.color;
  badge.style.border      = `1px solid ${mc.color}55`;

  renderNavGrids();
  showQ(0);
  startTimer();
}

// ── TIMER ──
function startTimer() {
  clearInterval(timerInterval);
  updateTimerDisplay();
  timerInterval = setInterval(() => {
    secondsLeft--;
    updateTimerDisplay();
    if (secondsLeft <= 0) { clearInterval(timerInterval); doSubmit(true); }
  }, 1000);
}

function updateTimerDisplay() {
  const el = $('timerText');
  el.textContent = fmt(secondsLeft);
  if (secondsLeft < 300) {
    el.className = 'timer-warn text-red-400 text-lg';
    $('timerDisplay').style.borderColor  = 'rgba(239,68,68,0.5)';
    $('timerDisplay').style.background   = 'rgba(239,68,68,0.1)';
  } else if (secondsLeft < 600) {
    el.className = 'text-amber-400 text-lg';
  } else {
    el.className = 'text-sky-300 text-lg';
  }
}

// ── SHOW QUESTION ──
function showQ(idx) {
  if (idx < 0 || idx >= examQuestions.length) return;
  currentIdx = idx;
  const q   = examQuestions[idx];
  const mc  = getMC(q.module);
  const ans = userAnswers[idx] !== undefined;
  const tot = examQuestions.length;
  const cnt = Object.keys(userAnswers).length;

  $('qModuleBadge').textContent = mc.label;
  $('qModuleBadge').style.background = mc.bg;
  $('qModuleBadge').style.color      = mc.color;
  $('qNumber').textContent    = `Câu ${idx+1} / ${tot}`;
  $('questionText').textContent = q.question;
  $('progressText').textContent = `${cnt}/${tot} đã trả lời`;
  $('navInfo').textContent      = `${cnt}/${tot} đã trả lời`;
  $('progressBar').style.width  = (cnt/tot*100)+'%';
  ans ? $('qAnsweredBadge').classList.remove('hidden')
      : $('qAnsweredBadge').classList.add('hidden');

  const labels = ['A','B','C','D'];
  $('optionsContainer').innerHTML = q.options.map((opt,i) => {
    const sel = userAnswers[idx] === opt;
    const esc = opt.replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/"/g,'&quot;');
    return `<div class="option-btn ${sel?'selected':''}"
                 onclick="selectOpt(${idx},this,'${esc}')">
      <span style="min-width:24px;height:24px;border-radius:50%;background:rgba(255,255,255,0.07);
                   display:flex;align-items:center;justify-content:center;
                   font-size:11px;font-weight:700;flex-shrink:0;margin-top:2px">${labels[i]}</span>
      <span style="font-size:14px;line-height:1.5">${opt}</span>
    </div>`;
  }).join('');

  updateNavGrids();
  updateSidebarStats();
}

function selectOpt(idx, el, val) {
  userAnswers[idx] = val;
  document.querySelectorAll('#optionsContainer .option-btn').forEach(b => b.classList.remove('selected'));
  el.classList.add('selected');
  $('qAnsweredBadge').classList.remove('hidden');
  const cnt = Object.keys(userAnswers).length;
  const tot = examQuestions.length;
  $('progressText').textContent = `${cnt}/${tot} đã trả lời`;
  $('navInfo').textContent      = `${cnt}/${tot} đã trả lời`;
  $('progressBar').style.width  = (cnt/tot*100)+'%';
  updateNavGrids();
  updateSidebarStats();
}

function prevQ() { showQ(currentIdx-1); }
function nextQ() { showQ(currentIdx+1); }

// ── NAV GRID ──
function renderNavGrids() {
  ['desktopNavGrid','mobileNavGrid'].forEach(id => {
    $(id).innerHTML = examQuestions.map((_,i) => {
      const a = userAnswers[i] !== undefined;
      const c = i === currentIdx;
      return `<button onclick="goToQ(${i})" class="nav-btn ${a?'answered':''} ${c?'current':''}">${i+1}</button>`;
    }).join('');
  });
}
function updateNavGrids() { renderNavGrids(); }

function updateSidebarStats() {
  const a = Object.keys(userAnswers).length, t = examQuestions.length;
  const pct = t ? Math.round(a/t*100) : 0;
  const html = `<div style="display:flex;justify-content:space-between;font-size:11px;color:#64748b;margin-bottom:4px"><span>Tiến độ</span><span>${a}/${t}</span></div>
    <div style="height:4px;background:rgba(255,255,255,0.07);border-radius:2px">
      <div style="height:100%;width:${pct}%;background:linear-gradient(90deg,#0ea5e9,#6366f1);border-radius:2px;transition:width .3s"></div>
    </div>`;
  $('sidebarStats').innerHTML = html;
  if ($('mobileStats')) $('mobileStats').innerHTML = html;
}

function goToQ(i) {
  showQ(i);
  const d = $('mobileDrawer');
  if (d && d.classList.contains('open')) toggleDrawer();
}

// ── DRAWER ──
function toggleDrawer() {
  const d = $('mobileDrawer'), o = $('drawerOverlay');
  d.classList.toggle('open');
  o.classList.toggle('hidden');
  if (d.classList.contains('open')) { renderNavGrids(); updateSidebarStats(); }
}

// ── SUBMIT ──
function confirmSubmit() {
  const a = Object.keys(userAnswers).length, t = examQuestions.length;
  $('modalStats').innerHTML = `<div>Đã trả lời: <b style="color:#10b981">${a}</b> / ${t}</div>
    ${t-a>0 ? `<div style="color:#f59e0b;margin-top:4px">⚠ Còn ${t-a} câu chưa trả lời</div>`
            : '<div style="color:#10b981;margin-top:4px">✓ Đã hoàn thành tất cả!</div>'}`;
  $('submitModal').classList.remove('hidden');
}
function closeSubmitModal() { $('submitModal').classList.add('hidden'); }

function doSubmit(auto=false) {
  clearInterval(timerInterval);
  closeSubmitModal();
  $('examScreen').classList.add('hidden');
  $('resultScreen').classList.remove('hidden');

  let correct = 0;
  examQuestions.forEach((q,i) => { if (userAnswers[i] === q.correctAnswer) correct++; });

  const total  = examQuestions.length;
  const pct    = Math.round(correct/total*100);
  const passed = pct >= 70;
  const mc     = getMC(selectedModule);

  $('resultModuleName').textContent = mc.name;
  $('resultModuleName').style.color = mc.color;
  $('scorePct').textContent   = pct+'%';
  $('scorePct').style.color   = passed ? '#10b981' : '#ef4444';
  $('scoreDetail').textContent = `${correct}/${total}`;
  $('passStatus').textContent  = passed ? '✓ ĐẠT' : '✗ KHÔNG ĐẠT';
  $('passStatus').style.color  = passed ? '#10b981' : '#ef4444';

  setTimeout(() => {
    $('scoreBar').style.width = pct+'%';
    $('scoreBar').style.background = passed
      ? 'linear-gradient(90deg,#10b981,#34d399)'
      : 'linear-gradient(90deg,#ef4444,#f87171)';
  }, 100);

  renderReview('all');
}

// ── REVIEW ──
function filterReview(f) {
  reviewFilter = f;
  ['all','wrong','correct'].forEach(k => {
    const key = 'f' + k.charAt(0).toUpperCase() + k.slice(1);
    $(key).style.background   = reviewFilter===k ? 'rgba(14,165,233,0.35)' : '';
    $(key).style.borderColor  = reviewFilter===k ? '#0ea5e9' : 'rgba(255,255,255,0.15)';
  });
  renderReview(f);
}

function renderReview(filter) {
  const mc     = getMC(selectedModule);
  const labels = ['A','B','C','D'];
  const items  = examQuestions.map((q,i) => {
    const ua = userAnswers[i];
    const ok = ua === q.correctAnswer;
    return {q,i,ua,ok};
  }).filter(({ok}) =>
    filter === 'all' || (filter === 'correct' && ok) || (filter === 'wrong' && !ok)
  );

  $('reviewList').innerHTML = items.length ? items.map(({q,i,ua,ok}) => `
    <div style="background:rgba(255,255,255,0.03);border-radius:14px;padding:16px;
                border:1px solid ${ok?'rgba(16,185,129,0.22)':'rgba(239,68,68,0.22)'}">
      <div style="display:flex;align-items:flex-start;gap:10px;margin-bottom:10px">
        <div style="width:24px;height:24px;border-radius:50%;flex-shrink:0;
                    display:flex;align-items:center;justify-content:center;
                    font-weight:900;font-size:12px;margin-top:2px;
                    background:${ok?'rgba(16,185,129,0.18)':'rgba(239,68,68,0.18)'};
                    color:${ok?'#10b981':'#ef4444'}">${ok?'✓':'✗'}</div>
        <div>
          <div style="font-size:11px;color:${mc.color};font-weight:800;margin-bottom:4px">
            ${mc.label} — Câu ${i+1}
          </div>
          <p style="font-size:13px;font-weight:600;color:white;line-height:1.5;margin:0">${q.question}</p>
        </div>
      </div>
      <div style="padding-left:34px">
        ${q.options.map((opt,oi) => {
          const isC = opt === q.correctAnswer;
          const isU = opt === ua;
          const clr = isC ? '#10b981' : isU ? '#ef4444' : 'rgba(255,255,255,0.3)';
          const ico = isC ? '✓' : isU ? '✗' : '○';
          const strike = (isU && !isC) ? 'text-decoration:line-through;' : '';
          return `<div style="font-size:12px;color:${clr};display:flex;gap:6px;margin-bottom:3px;${strike}">
            <span>${ico}</span><span>${labels[oi]}. ${opt}</span>
          </div>`;
        }).join('')}
        ${!ok ? `
          <div style="margin-top:10px;padding:10px 12px;border-radius:8px;
                      background:rgba(16,185,129,0.08);border-left:3px solid #10b981">
            <div style="font-size:11px;font-weight:800;color:#34d399;margin-bottom:4px">
              📌 Đáp án đúng:
            </div>
            <div style="font-size:13px;color:white;font-weight:600">${q.correctAnswer}</div>
          </div>` : ''}
      </div>
    </div>`).join('')
    : '<div style="text-align:center;color:#64748b;padding:32px 0">Không có câu nào phù hợp</div>';
}

// ── NAVIGATION ──
function backToStart() {
  $('resultScreen').classList.add('hidden');
  $('startScreen').classList.remove('hidden');
  selectedModule = null;
}

function retakeModule() {
  const mod = selectedModule;
  $('resultScreen').classList.add('hidden');
  $('startScreen').classList.remove('hidden');
  // Small delay so screen transition is visible before starting
  setTimeout(() => startExam(mod), 50);
}

// Init
renderBubbles();
</script>
</body>
</html
