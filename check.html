<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CNS Quiz — Kiểm tra Ngân hàng đề</title>
  <script src="js/questions.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      padding: 24px;
      min-height: 100vh;
    }
    h1 {
      font-size: 1.6rem;
      color: #38bdf8;
      margin-bottom: 6px;
    }
    .sub { color: #64748b; font-size: 0.85rem; margin-bottom: 24px; }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 16px;
      margin-bottom: 32px;
    }
    .card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 12px;
      padding: 16px 20px;
    }
    .card-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
    }
    .card-icon { font-size: 1.4rem; }
    .card-title { font-size: 1rem; font-weight: 600; color: #cbd5e1; }
    .card-count {
      font-size: 2rem;
      font-weight: 700;
      color: #38bdf8;
      margin-bottom: 4px;
    }
    .card-change {
      font-size: 0.78rem;
      padding: 2px 8px;
      border-radius: 20px;
      display: inline-block;
    }
    .change-new { background: #064e3b; color: #34d399; }
    .change-append { background: #1e3a5f; color: #60a5fa; }
    .change-keep { background: #1e293b; color: #64748b; border: 1px solid #334155; }

    .section-title {
      font-size: 1.1rem;
      font-weight: 600;
      color: #94a3b8;
      margin-bottom: 14px;
      padding-bottom: 8px;
      border-bottom: 1px solid #334155;
    }
    .stats-row {
      display: flex;
      gap: 16px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }
    .stat-box {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 10px;
      padding: 14px 20px;
      text-align: center;
      min-width: 140px;
    }
    .stat-value { font-size: 1.8rem; font-weight: 700; color: #f1f5f9; }
    .stat-label { font-size: 0.75rem; color: #64748b; margin-top: 4px; }

    .sample-section { margin-top: 32px; }
    .sample-picker {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }
    .mod-btn {
      padding: 6px 14px;
      border-radius: 20px;
      border: 1px solid #334155;
      background: #1e293b;
      color: #94a3b8;
      cursor: pointer;
      font-size: 0.82rem;
      transition: all 0.2s;
    }
    .mod-btn:hover, .mod-btn.active {
      background: #0369a1;
      border-color: #38bdf8;
      color: #fff;
    }

    .q-list { display: flex; flex-direction: column; gap: 12px; }
    .q-card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 10px;
      padding: 16px;
    }
    .q-num { font-size: 0.72rem; color: #475569; margin-bottom: 6px; }
    .q-text { font-size: 0.92rem; color: #e2e8f0; margin-bottom: 12px; line-height: 1.5; }
    .q-opts { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
    .q-opt {
      padding: 7px 12px;
      border-radius: 6px;
      font-size: 0.82rem;
      background: #0f172a;
      border: 1px solid #334155;
      color: #94a3b8;
    }
    .q-opt.correct {
      background: #064e3b;
      border-color: #34d399;
      color: #34d399;
      font-weight: 600;
    }
    .q-opt.correct::before { content: "✓ "; }

    .check-section {
      margin-top: 32px;
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 12px;
      padding: 20px;
    }
    .check-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 0;
      border-bottom: 1px solid #1e293b;
      font-size: 0.88rem;
    }
    .check-row:last-child { border: none; }
    .check-ok { color: #34d399; font-size: 1.1rem; }
    .check-fail { color: #f87171; font-size: 1.1rem; }
    .check-label { color: #94a3b8; flex: 1; }
    .check-value { color: #e2e8f0; font-weight: 600; }

    .pagination {
      display: flex; gap: 8px; align-items: center;
      margin-top: 16px; flex-wrap: wrap;
    }
    .pg-btn {
      padding: 6px 14px; border-radius: 8px;
      border: 1px solid #334155; background: #1e293b;
      color: #94a3b8; cursor: pointer; font-size: 0.82rem;
    }
    .pg-btn:hover { background: #334155; color: #e2e8f0; }
    .pg-info { color: #64748b; font-size: 0.82rem; }
  </style>
</head>
<body>
  <h1>🔍 CNS Quiz — Kiểm tra Ngân hàng đề</h1>
  <p class="sub" id="timestamp">Đang tải dữ liệu...</p>

  <!-- TỔNG QUAN -->
  <div class="section-title">📊 Tổng quan</div>
  <div class="stats-row" id="stats-row"></div>

  <!-- THEO MODULE -->
  <div class="section-title">📦 Theo module</div>
  <div class="grid" id="module-grid"></div>

  <!-- VALIDATION -->
  <div class="section-title">✅ Kết quả kiểm tra tự động</div>
  <div class="check-section" id="check-section"></div>

  <!-- XEM MẪU -->
  <div class="sample-section">
    <div class="section-title">👁 Xem mẫu câu hỏi</div>
    <div class="sample-picker" id="mod-picker"></div>
    <div class="pagination" id="pagination"></div>
    <div class="q-list" id="q-list"></div>
  </div>

<script>
// ── Data ─────────────────────────────────────────────────────────────────────
const BEFORE = {
  'VHF': 121, 'Ghi âm': 66, 'ADS-B': 301, 'RDP/FDP': 46,
  'VCCS': 61, 'SMS': 17, 'A-SGMCS': 67, 'Radar': 78,
  'ADS-B-LT': 30, 'Radar-TSN': 121, 'KipTruong-TSN': 233
};
const CHANGED = {
  'VHF': 'new', 'VCCS': 'new', 'A-SGMCS': 'new', 'RDP/FDP': 'append'
};
const MOD_ICONS = {
  'VHF':'📡','Ghi âm':'🎙','ADS-B':'🛰','RDP/FDP':'🖥',
  'VCCS':'☎','SMS':'🛡','A-SGMCS':'⚙','Radar':'📻',
  'ADS-B-LT':'🛰','Radar-TSN':'📻','KipTruong-TSN':'🧑‍💼'
};

// ── Build stats ───────────────────────────────────────────────────────────────
function buildStats() {
  const counts = {};
  questionBank.forEach(q => counts[q.module] = (counts[q.module]||0) + 1);
  const total = questionBank.length;
  const idMin = Math.min(...questionBank.map(q=>q.id));
  const idMax = Math.max(...questionBank.map(q=>q.id));

  // Stats row
  document.getElementById('timestamp').textContent =
    `Kiểm tra lúc: ${new Date().toLocaleString('vi-VN')} | questions.js được tải thành công`;

  const statsData = [
    { value: total, label: 'Tổng câu hỏi' },
    { value: Object.keys(counts).length, label: 'Số module' },
    { value: `${idMin}–${idMax}`, label: 'ID range' },
  ];
  document.getElementById('stats-row').innerHTML = statsData.map(s =>
    `<div class="stat-box"><div class="stat-value">${s.value}</div><div class="stat-label">${s.label}</div></div>`
  ).join('');

  // Module grid
  const moduleOrder = ['VHF','Ghi âm','ADS-B','RDP/FDP','VCCS','SMS','A-SGMCS','Radar','ADS-B-LT','Radar-TSN','KipTruong-TSN'];
  document.getElementById('module-grid').innerHTML = moduleOrder.map(mod => {
    const after = counts[mod] || 0;
    const before = BEFORE[mod] || 0;
    const diff = after - before;
    const change = CHANGED[mod];
    let badge = '';
    if (change === 'new') badge = `<span class="card-change change-new">🔄 Thay mới: ${before}→${after}</span>`;
    else if (change === 'append') badge = `<span class="card-change change-append">➕ Thêm ${diff} câu</span>`;
    else badge = `<span class="card-change change-keep">Giữ nguyên</span>`;
    return `
      <div class="card">
        <div class="card-header">
          <span class="card-icon">${MOD_ICONS[mod]||'❓'}</span>
          <span class="card-title">${mod}</span>
        </div>
        <div class="card-count">${after}</div>
        ${badge}
      </div>`;
  }).join('');

  return counts;
}

// ── Validation ────────────────────────────────────────────────────────────────
function runValidation(counts) {
  const checks = [];

  // 1. Total
  const total = questionBank.length;
  checks.push({ ok: total === 1574, label: 'Tổng câu hỏi = 1574', value: total });

  // 2. IDs sequential
  const ids = questionBank.map(q=>q.id).sort((a,b)=>a-b);
  const sequential = ids.every((id,i) => id === i+1);
  checks.push({ ok: sequential, label: 'IDs sequential (1–1574)', value: sequential ? 'OK' : 'CÓ GAP' });

  // 3. No duplicate IDs
  const dupSet = new Set(ids);
  checks.push({ ok: dupSet.size === ids.length, label: 'Không trùng ID', value: `${dupSet.size} unique / ${ids.length} total` });

  // 4. correctAnswer in options
  const badAnswers = questionBank.filter(q => !q.options.includes(q.correctAnswer));
  checks.push({ ok: badAnswers.length === 0, label: 'correctAnswer khớp options', value: `${questionBank.length - badAnswers.length}/${questionBank.length} ✓` });

  // 5. All have 4 options
  const bad4 = questionBank.filter(q => q.options.length !== 4);
  checks.push({ ok: bad4.length === 0, label: 'Tất cả đủ 4 lựa chọn', value: bad4.length === 0 ? 'OK' : `${bad4.length} câu thiếu` });

  // 6. Module counts
  const expected = { 'VHF':144,'Ghi âm':66,'ADS-B':301,'RDP/FDP':146,'VCCS':246,'SMS':17,'A-SGMCS':192,'Radar':78,'ADS-B-LT':30,'Radar-TSN':121,'KipTruong-TSN':233 };
  const countOk = Object.entries(expected).every(([m,n]) => counts[m] === n);
  checks.push({ ok: countOk, label: 'Số câu từng module đúng kế hoạch', value: countOk ? 'OK' : 'Sai số lượng' });

  document.getElementById('check-section').innerHTML = checks.map(c =>
    `<div class="check-row">
      <span class="${c.ok ? 'check-ok' : 'check-fail'}">${c.ok ? '✅' : '❌'}</span>
      <span class="check-label">${c.label}</span>
      <span class="check-value">${c.value}</span>
    </div>`
  ).join('');

  if (badAnswers.length > 0) {
    console.warn('Bad answers:', badAnswers.slice(0,5));
  }
}

// ── Sample viewer ─────────────────────────────────────────────────────────────
let currentMod = 'VHF';
let currentPage = 0;
const PAGE_SIZE = 5;

function getModuleQuestions(mod) {
  return questionBank.filter(q => q.module === mod);
}

function renderSamples() {
  const qs = getModuleQuestions(currentMod);
  const totalPages = Math.ceil(qs.length / PAGE_SIZE);
  const pageQs = qs.slice(currentPage * PAGE_SIZE, (currentPage + 1) * PAGE_SIZE);

  document.getElementById('pagination').innerHTML = `
    <button class="pg-btn" onclick="changePage(-1)" ${currentPage===0?'disabled':''}>◀ Trước</button>
    <span class="pg-info">Trang ${currentPage+1}/${totalPages} (${qs.length} câu)</span>
    <button class="pg-btn" onclick="changePage(1)" ${currentPage===totalPages-1?'disabled':''}>Sau ▶</button>
    <span class="pg-info" style="margin-left:8px">ID ${pageQs[0]?.id}–${pageQs[pageQs.length-1]?.id}</span>
  `;

  document.getElementById('q-list').innerHTML = pageQs.map(q => `
    <div class="q-card">
      <div class="q-num">ID: ${q.id} · ${q.module} · ${q.refDoc}</div>
      <div class="q-text">${q.question}</div>
      <div class="q-opts">
        ${q.options.map(opt => `
          <div class="q-opt ${opt === q.correctAnswer ? 'correct' : ''}">${opt}</div>
        `).join('')}
      </div>
    </div>
  `).join('');
}

function changePage(dir) {
  const qs = getModuleQuestions(currentMod);
  const totalPages = Math.ceil(qs.length / PAGE_SIZE);
  currentPage = Math.max(0, Math.min(totalPages - 1, currentPage + dir));
  renderSamples();
}

function selectMod(mod) {
  currentMod = mod;
  currentPage = 0;
  document.querySelectorAll('.mod-btn').forEach(b => b.classList.toggle('active', b.dataset.mod === mod));
  renderSamples();
}

function buildPicker() {
  const mods = [...new Set(questionBank.map(q=>q.module))];
  document.getElementById('mod-picker').innerHTML = mods.map(m =>
    `<button class="mod-btn${m===currentMod?' active':''}" data-mod="${m}" onclick="selectMod('${m}')">${MOD_ICONS[m]||''} ${m}</button>`
  ).join('');
}

// ── Init ──────────────────────────────────────────────────────────────────────
window.addEventListener('load', () => {
  if (typeof questionBank === 'undefined') {
    document.body.innerHTML = '<div style="color:#f87171;padding:40px;font-size:1.2rem">❌ Không load được questions.js — kiểm tra đường dẫn file</div>';
    return;
  }
  const counts = buildStats();
  runValidation(counts);
  buildPicker();
  renderSamples();
});
</script>
</body>
</html>
